name: bindings-smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  rust-and-bindings:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: core-tests
            os: ubuntu-latest
          - check: python-smoke
            os: ubuntu-latest
          - check: c-smoke
            os: ubuntu-latest
          - check: wasm-smoke
            os: ubuntu-latest
          - check: node-smoke
            os: windows-latest
          - check: kotlin-smoke
            os: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        id: setup-python
        if: matrix.check == 'python-smoke'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python version info
        if: matrix.check == 'python-smoke'
        run: |
          python --version
          python -c "import sys; print(sys.executable)"

      - name: Core tests
        if: matrix.check == 'core-tests'
        run: cargo test -p synx-core

      - name: Python smoke (Rust unit tests)
        if: matrix.check == 'python-smoke'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: cargo test -p synx-python --lib --no-default-features

      - name: C FFI smoke (Rust unit tests)
        if: matrix.check == 'c-smoke'
        run: cargo test -p synx-c --lib

      - name: WASM smoke (Rust unit tests)
        if: matrix.check == 'wasm-smoke'
        run: cargo test -p synx-wasm --lib

      - name: Setup Java (Kotlin / JNA)
        if: matrix.check == 'kotlin-smoke'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        if: matrix.check == 'node-smoke'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Node binding
        if: matrix.check == 'node-smoke'
        run: cargo build --release -p synx-node

      - name: Verify Node DLL
        if: matrix.check == 'node-smoke'
        shell: pwsh
        run: Get-ChildItem target/release/synx_node* | Format-Table Name,Length

      - name: Node smoke
        if: matrix.check == 'node-smoke'
        working-directory: bindings/node
        run: node smoke.js

      - name: Build synx-c for Kotlin/JNA
        if: matrix.check == 'kotlin-smoke'
        run: cargo build -p synx-c --release

      - name: Kotlin / JVM smoke (Gradle)
        if: matrix.check == 'kotlin-smoke'
        working-directory: bindings/kotlin
        env:
          SYNX_LIB_DIR: ${{ github.workspace }}/target/release
        run: chmod +x ./gradlew && ./gradlew test --no-daemon
